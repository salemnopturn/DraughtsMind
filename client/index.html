<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DraughtsMind — Damas Brasileiras</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="logo">🕢 DraughtsMind</h1>
      <div class="header-actions">
        <button id="btn-new" class="btn btn-gold">Novo Jogo</button>
        <button id="btn-save" class="btn btn-blue">Salvar</button>
        <button id="btn-load" class="btn btn-outline">Carregar</button>
        <button id="btn-pdn" class="btn btn-outline">Importar PDN</button>
      </div>
    </header>

    <main class="main">
      <div class="board-wrapper">
        <div class="coord-numbers" id="coord-numbers"></div>
        <div class="board" id="board"></div>
        <div class="coord-letters" id="coord-letters"></div>
      </div>

      <aside class="sidebar">
        <div class="panel status-panel">
          <div class="status-bar" id="status-container">
            <span id="status-text">Pronto</span>
          </div>
          <div class="analysis" id="analysis-text">Análise: Desativado</div>
        </div>

        <div class="panel clock-panel">
          <div class="clock-row">
            <span class="clock-label">Brancas</span>
            <span class="timer" id="clock-white">--:--</span>
          </div>
          <div class="clock-row">
            <span class="clock-label">Pretas</span>
            <span class="timer" id="clock-black">--:--</span>
          </div>
          <label class="ctrl-label">Tempo (min): <span id="time-val">0</span></label>
          <input type="range" id="cfg-time" min="0" max="60" value="0" class="slider">
        </div>

        <div class="panel stats-panel">
          <div class="piece-count">
            <span id="white-count">⚪ 12</span>
            <span id="black-count">⚫ 12</span>
          </div>
          <div id="cpu-stats" style="display:none; font-size:0.8rem; margin-top:0.5rem;"></div>
        </div>

        <div class="panel controls-panel">
          <label class="ctrl-label">Modo</label>
          <div class="mode-btns" id="mode-btns">
            <button class="mode-btn active" data-mode="0">PvP</button>
            <button class="mode-btn" data-mode="1">PvA</button>
            <button class="mode-btn" data-mode="2">AvA</button>
          </div>
          <label class="ctrl-label">Profundidade: <span id="depth-val">8</span></label>
          <input type="range" id="cfg-depth" min="1" max="16" value="8" class="slider">
          <label class="ctrl-label toggle-label">
            <input type="checkbox" id="cfg-analysis" class="toggle-input">
            Análise em tempo real
          </label>
          <label class="ctrl-label">Visão</label>
          <select id="cfg-view" class="select-input">
            <option value="W">Brancas</option>
            <option value="B">Pretas</option>
          </select>
        </div>

        <div class="panel history-panel">
          <h3 class="panel-title">Lances</h3>
          <div class="move-list" id="move-list"></div>
        </div>
      </aside>
    </main>
  </div>

  <!-- Modals -->
  <div class="modal-overlay" id="modal" style="display:none">
    <div class="modal">
      <h2 id="modal-title"></h2>
      <p id="modal-body"></p>
      <button class="btn btn-gold" onclick="document.getElementById('modal').style.display='none'">OK</button>
    </div>
  </div>

  <div class="modal-overlay" id="resume-modal" style="display:none">
    <div class="modal">
      <h2>Jogo em Andamento</h2>
      <p>Deseja retomar o jogo salvo?</p>
      <div class="modal-actions">
        <button class="btn btn-gold" id="resume-yes">Retomar</button>
        <button class="btn btn-outline" id="resume-no">Novo Jogo</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="pdn-modal" style="display:none">
    <div class="modal">
      <h2>Importar PDN</h2>
      <textarea id="pdn-input" rows="6" placeholder="Cole a notação PDN aqui..."></textarea>
      <div class="modal-actions">
        <button class="btn btn-gold" id="pdn-import">Importar</button>
        <button class="btn btn-outline" onclick="document.getElementById('pdn-modal').style.display='none'">Cancelar</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="load-modal" style="display:none">
    <div class="modal">
      <h2>Carregar Partida</h2>
      <div id="load-list" style="text-align:left;max-height:300px;overflow-y:auto;margin-bottom:1rem;"></div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="document.getElementById('load-modal').style.display='none'">Cancelar</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
